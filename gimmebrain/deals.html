<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){if(sessionStorage.getItem('gr_authed')!=='1')window.location.href='/gimmebrain/login.html';})()</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Dashboard — Good Results</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0D0F14;--surface:#11141A;--surface2:#161B24;--surface3:#0A0C10;
  --white:#F0F4FF;--cream:#C8D4E4;--muted:#8A95A8;--dim:#555A66;
  --border:rgba(255,255,255,0.07);--orange:#FF5C1A;--orange-glow:rgba(255,92,26,0.15);
  --orange-border:rgba(255,92,26,0.25);--green:#22C55E;--green-bg:rgba(34,197,94,0.1);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.08);--yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.08);
  --purple:#A855F7;--purple-bg:rgba(168,85,247,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;}
body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}

.header{padding:14px 44px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(13,15,20,0.95);backdrop-filter:blur(14px);position:sticky;top:0;z-index:100;}
.logo{font-size:0.72rem;color:var(--orange);letter-spacing:0.1em;text-transform:uppercase;font-weight:800;}
.header-right{display:flex;align-items:center;gap:16px;}
.header-link{font-size:0.72rem;font-weight:500;color:var(--muted);letter-spacing:0.06em;text-decoration:none;transition:color 0.15s;}
.header-link:hover{color:var(--orange);}

.hero{max-width:1100px;margin:0 auto;padding:48px 44px 32px;}
.eyebrow{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--green);margin-bottom:14px;font-weight:600;}
.hero h1{font-size:clamp(1.4rem,3vw,2.2rem);font-weight:800;letter-spacing:0.03em;margin-bottom:10px;}
.hero h1 em{font-style:normal;color:var(--orange);font-weight:900;}
.hero-sub{font-size:0.88rem;color:var(--cream);max-width:520px;font-weight:400;line-height:1.6;}

.stats-bar{max-width:1100px;margin:0 auto;padding:0 44px 32px;display:flex;gap:12px;flex-wrap:wrap;}
.stat-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.68rem;font-weight:600;letter-spacing:0.03em;}
.stat-pill .num{color:var(--orange);font-weight:800;}
.stat-pill.green .num{color:var(--green);}
.stat-pill.yellow .num{color:var(--yellow);}
.stat-pill.red .num{color:var(--red);}

.filters{max-width:1100px;margin:0 auto;padding:0 44px 20px;display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:6px 14px;font-family:'Inter',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.filter-btn:hover{border-color:var(--orange-border);color:var(--cream);}
.filter-btn.active{background:var(--orange-glow);border-color:var(--orange-border);color:var(--orange);}

.deal-grid{max-width:1100px;margin:0 auto;padding:0 44px 80px;display:grid;grid-template-columns:1fr;gap:10px;}

.deal-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:all 0.2s;}
.deal-card:hover{border-color:var(--orange-border);background:var(--surface2);}

.card-top{display:grid;grid-template-columns:80px 1fr auto;gap:16px;padding:16px 20px;align-items:center;cursor:pointer;}
.card-thumb{width:80px;height:60px;border-radius:4px;overflow:hidden;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:1.2rem;}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;}

.card-main{min-width:0;}
.card-address{font-size:0.88rem;font-weight:700;color:var(--white);letter-spacing:0.01em;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-location{font-size:0.62rem;color:var(--muted);font-weight:500;letter-spacing:0.03em;}

.card-numbers{display:flex;gap:20px;align-items:center;flex-shrink:0;}
.card-num{text-align:right;}
.card-num-label{font-size:0.52rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-bottom:2px;}
.card-num-val{font-size:0.95rem;font-weight:700;color:var(--cream);}
.card-num-val.orange{color:var(--orange);}
.card-num-val.green{color:var(--green);}
.card-num-val.red{color:var(--red);}

.card-badges{display:flex;gap:6px;align-items:center;margin-left:16px;}
.card-badge{font-size:0.5rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:10px;}
.badge-off{background:rgba(255,92,26,0.12);color:var(--orange);border:1px solid var(--orange-border);}
.badge-on{background:var(--green-bg);color:var(--green);border:1px solid var(--green);}
.card-expand-icon{color:var(--dim);font-size:0.7rem;margin-left:8px;transition:transform 0.2s;}
.deal-card.open .card-expand-icon{transform:rotate(180deg);}

.card-detail{max-height:0;overflow:hidden;transition:max-height 0.5s ease;}
.deal-card.open .card-detail{max-height:2000px;}
.card-detail-inner{padding:0 20px 20px;border-top:1px solid var(--border);margin-top:0;padding-top:16px;}

.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

.detail-section{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px 14px;}
.detail-section-title{font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:6px;}
.detail-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.detail-row:last-child{border-bottom:none;}
.detail-key{font-size:0.6rem;color:var(--muted);font-weight:500;}
.detail-val{font-size:0.78rem;color:var(--cream);font-weight:600;text-align:right;}
.detail-val.hi{color:var(--orange);}
.detail-val.green{color:var(--green);}
.detail-val.urgent{color:var(--red);font-weight:700;}
.detail-val.warn{color:var(--yellow);font-weight:700;}

/* EDIT MODE */
.edit-input{background:var(--surface3);border:1px solid var(--orange-border);border-radius:3px;color:var(--white);font-family:'Inter',sans-serif;font-size:0.75rem;font-weight:600;padding:4px 8px;width:120px;text-align:right;outline:none;transition:border-color 0.15s;}
.edit-input:focus{border-color:var(--orange);}
.edit-input.wide{width:100%;text-align:left;}
.edit-textarea{background:var(--surface3);border:1px solid var(--orange-border);border-radius:3px;color:var(--white);font-family:'Inter',sans-serif;font-size:0.72rem;padding:8px;width:100%;min-height:80px;resize:vertical;outline:none;}
.edit-textarea:focus{border-color:var(--orange);}
.edit-select{background:var(--surface3);border:1px solid var(--orange-border);border-radius:3px;color:var(--white);font-family:'Inter',sans-serif;font-size:0.72rem;padding:4px 8px;outline:none;cursor:pointer;}

/* ACTION BUTTONS */
.card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.card-action-btn{padding:7px 14px;border-radius:3px;font-family:'Inter',sans-serif;font-size:0.6rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;transition:all 0.15s;cursor:pointer;border:1px solid;}
.btn-view{background:var(--orange-glow);color:var(--orange);border-color:var(--orange-border);}
.btn-view:hover{background:rgba(255,92,26,0.2);}
.btn-process{background:rgba(168,85,247,0.08);color:var(--purple);border-color:rgba(168,85,247,0.25);}
.btn-process:hover{background:rgba(168,85,247,0.15);}
.btn-edit{background:rgba(59,130,246,0.08);color:#3B82F6;border-color:rgba(59,130,246,0.25);}
.btn-edit:hover{background:rgba(59,130,246,0.15);}
.btn-save{background:var(--green-bg);color:var(--green);border-color:var(--green);}
.btn-save:hover{background:rgba(34,197,94,0.2);}
.btn-cancel{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,0.25);}
.btn-cancel:hover{background:rgba(239,68,68,0.15);}
.btn-save:disabled{opacity:0.4;cursor:not-allowed;}
.btn-close{background:rgba(37,99,235,0.08);color:#3B82F6;border-color:rgba(37,99,235,0.25);}
.btn-close:hover{background:rgba(37,99,235,0.15);}
.btn-workflow{background:rgba(34,197,94,0.08);color:var(--green);border-color:rgba(34,197,94,0.25);}
.btn-workflow:hover{background:rgba(34,197,94,0.15);}
.btn-close:disabled,.btn-workflow:disabled{opacity:0.4;cursor:not-allowed;}
.btn-close.done,.btn-workflow.done{opacity:0.6;cursor:default;}

/* PHOTO GALLERY */
.photo-section{margin-top:16px;}
.photo-section-title{font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--orange);margin-bottom:10px;font-weight:700;}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:12px;}
.photo-item{position:relative;border-radius:4px;overflow:hidden;border:1px solid var(--border);aspect-ratio:4/3;background:var(--surface2);}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-delete{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(239,68,68,0.9);color:white;border:none;font-size:0.7rem;font-weight:700;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;transition:transform 0.1s;}
.photo-delete:hover{transform:scale(1.15);}
.deal-card.editing .photo-delete{display:flex;}
.photo-upload-zone{border:1.5px dashed var(--orange-border);border-radius:4px;padding:20px;text-align:center;cursor:pointer;background:var(--surface2);transition:all 0.15s;display:none;position:relative;}
.deal-card.editing .photo-upload-zone{display:block;}
.photo-upload-zone:hover,.photo-upload-zone.drag-over{border-color:var(--orange);background:var(--orange-glow);}
.photo-upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-upload-label{font-size:0.65rem;color:var(--muted);letter-spacing:0.05em;}
.photo-upload-label span{color:var(--orange);font-weight:600;}

/* SAVE STATUS */
.save-status{font-size:0.6rem;font-weight:600;letter-spacing:0.05em;padding:6px 12px;border-radius:3px;display:none;align-items:center;gap:6px;}
.save-status.saving{display:flex;background:rgba(59,130,246,0.1);color:#3B82F6;}
.save-status.saved{display:flex;background:var(--green-bg);color:var(--green);}
.save-status.error{display:flex;background:var(--red-bg);color:var(--red);}

/* LOADING */
.loading{text-align:center;padding:60px 40px;color:var(--dim);font-size:0.7rem;letter-spacing:0.1em;}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:80px 40px;color:var(--dim);}
.empty-icon{font-size:2rem;margin-bottom:12px;opacity:0.3;}
.empty-text{font-size:0.7rem;letter-spacing:0.08em;line-height:1.8;}

@media(max-width:860px){
  .hero{padding:32px 20px 24px;}
  .stats-bar,.filters,.deal-grid{padding-left:20px;padding-right:20px;}
  .card-top{grid-template-columns:60px 1fr;gap:12px;}
  .card-numbers{display:none;}
  .card-badges{margin-left:0;}
  .detail-grid{grid-template-columns:1fr;}
  .photo-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));}
}
@media(max-width:600px){
  .header{padding:14px 20px;}
  .detail-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">Good Results // Deal Dashboard</div>
  <div class="header-right">
    <a href="/gimmebrain/deal-generator" class="header-link">Deal Generator</a>
    <a href="/gimmebrain/" class="header-link">&larr; Hub</a>
  </div>
</header>

<section class="hero">
  <div class="eyebrow">All Deals &mdash; Live from GitHub</div>
  <h1>Deal <em>Dashboard</em></h1>
  <p class="hero-sub">Every deal page on the site, pulled live. Click to expand, edit inline, manage photos — changes save straight to GitHub.</p>
</section>

<div class="stats-bar" id="statsBar"></div>
<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="off">Off-Market</button>
  <button class="filter-btn" data-filter="on">On-Market</button>
</div>

<div class="deal-grid" id="dealGrid">
  <div class="loading"><div class="loading-spinner"></div><br>Loading deals from GitHub&hellip;</div>
</div>

<script>
const GITHUB_REPO = '2wice23/goodresults';
const GITHUB_PROXY = '/.netlify/functions/github-proxy';
const SITE_BASE = 'https://www.goodresults.org';
let allDeals = [];
let currentFilter = 'all';

// ── Helpers ──

function fmt$(n) {
  if (n == null || n === '') return '—';
  return '$' + Number(n).toLocaleString();
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  const now = new Date(); now.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function dateClass(days) {
  if (days === null) return '';
  if (days < 0) return 'dim';
  if (days <= 3) return 'urgent';
  if (days <= 7) return 'warn';
  return '';
}

function dateLabel(days) {
  if (days === null) return '';
  if (days < 0) return Math.abs(days) + 'd ago';
  if (days === 0) return 'TODAY';
  if (days === 1) return 'Tomorrow';
  return days + 'd';
}

// ── GitHub proxy calls ──

async function ghGet(path) {
  const r = await fetch(GITHUB_PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, method: 'GET' })
  });
  return r.json();
}

async function ghPut(path, body) {
  const r = await fetch(GITHUB_PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, method: 'PUT', body })
  });
  return r.json();
}

async function ghDelete(path, body) {
  const r = await fetch(GITHUB_PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, method: 'DELETE', body })
  });
  return r.json();
}

// ── Close CRM proxy + custom fields ──

const CLOSE_PROXY = '/.netlify/functions/close-proxy';
const CLOSE_PIPELINE = 'pipe_1P0GjK0TFer4Yw2rbArK0u';
const CF = {
  address:              'cf_NdiIYfY11hv4MI2EccVt1UBe7hc3UcrPFVJn44F9AuT',
  ask:                  'cf_vjCMz4xV8VVONcfII1tqKNbrw4WhRCU80PmVBYdHvdv',
  arv:                  'cf_I31MKYiLvGaKZIifqfVQxkjMjhpkrImNP1q7DQOQxUZ',
  mao:                  'cf_BKzKEuNx4uGjjJpV78goMM7Duovz630H3Hse3z4mjZC',
  closingCosts:         'cf_I382twtiVhhsQ57v5x0ZoQ65zESufG7qM6FOQvoTbFp',
  officialOfferPrice:   'cf_geYAfr1h8XVC3x0bzMIEf0Aj6580oaFQ39wdLAJ2Gqe',
  emdAmount:            'cf_SOdFoDCrSlKj3uJlxR1Yv0vP1LrlyGatZVmtgDOqIcj',
  coeDate:              'cf_0maXpCwRBInrLrsfyJOPVZPDTTipRetz10WGJz2ptDO',
  acceptedDate:         'cf_EVnxq4atDCF6u1Ohl13HCad8mAGiK4RijRqhBJrZNzg',
  ddEndDate:            'cf_dYuh3zK6om5wx7DazAPdoknMZI1083pJ9Xfon6vdmYf',
  emdDueDate:           'cf_v7RDgaN83GrYYyUPjwry71a2COpLSEhM0Dn7Lbs4Vn7',
  currentContractPrice: 'cf_lnzdav3LInFjRAbyUATuFShueu7pIaFebA988JE8H91',
  wholesalePrice:       'cf_MDzK5zNGLLLUE9yYYWqubvC3hFzDeKA8m4ta6p8OPhx'
};

// Static dispo template IDs
const TEASER_TMPL   = 'smstmpl_5TJvHLXfVDqBV5c5D4a1MZ';
const FOLLOWUP_TMPL = 'smstmpl_3GVufkhASUv2ao47VskWV2';
const NUDGE_TMPL    = 'smstmpl_5gHTK848OX3hK9WP1cbG4A';

async function closeAPI(path, method, body) {
  const resp = await fetch(CLOSE_PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, method, body })
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error('Close API ' + path + ' failed (' + resp.status + '): ' + err);
  }
  return resp.json();
}

function parseDollar(str) {
  if (!str && str !== 0) return null;
  const n = Number(String(str).replace(/[^0-9.]/g, ''));
  return isNaN(n) || n === 0 ? null : n;
}

function addDaysToDate(dateStr, days) {
  if (!dateStr || days == null) return null;
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return null;
  d.setDate(d.getDate() + Number(days));
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ── Load deals ──

async function loadDeals() {
  const grid = document.getElementById('dealGrid');
  try {
    const items = await ghGet('/repos/' + GITHUB_REPO + '/contents/deals');
    const folders = items.filter(i => i.type === 'dir');

    if (!folders.length) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No deal pages found yet.<br>Use the Deal Processor to create one.</div></div>';
      return;
    }

    const promises = folders.map(async folder => {
      try {
        const file = await ghGet('/repos/' + GITHUB_REPO + '/contents/deals/' + folder.name + '/deal-doc.txt');
        if (!file || file.error) return null;
        if (!file || !file.content) return null;
        const json = JSON.parse(atob(file.content.replace(/\n/g, '')));
        json._slug = folder.name;
        json._docSha = file.sha;
        // Backfill old field names → unified names (wholesalePrice, repairsPerSqft, profitPotential)
        if (json.askingPrice && !json.wholesalePrice) json.wholesalePrice = json.askingPrice;
        if (json.estRepairs && !json.repairsPerSqft) json.repairsPerSqft = json.estRepairs;
        if (json.profit && !json.profitPotential) json.profitPotential = json.profit;
        // Remove old aliases so they don't persist on next save
        delete json.askingPrice; delete json.estRepairs; delete json.profit;

        // Get all files in deal folder (for photos)
        const files = await ghGet('/repos/' + GITHUB_REPO + '/contents/deals/' + folder.name).catch(() => []);
        const imgs = files.filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f.name));
        imgs.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true}));
        json._thumb = imgs.length ? SITE_BASE + '/deals/' + folder.name + '/' + imgs[0].name : null;
        json._photos = imgs.map(img => ({
          name: img.name,
          sha: img.sha,
          url: SITE_BASE + '/deals/' + folder.name + '/' + img.name,
          path: 'deals/' + folder.name + '/' + img.name
        }));
        json._photoCount = imgs.length;
        return json;
      } catch(e) { return null; }
    });

    const results = await Promise.all(promises);
    allDeals = results.filter(Boolean);

    allDeals.sort((a, b) => {
      const da = daysUntil(a.coeDate), db = daysUntil(b.coeDate);
      if (da !== null && db !== null) return da - db;
      if (da !== null) return -1;
      if (db !== null) return 1;
      return (b.wholesalePrice || 0) - (a.wholesalePrice || 0);
    });

    renderStats();
    renderDeals();
  } catch(err) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Error loading deals: ' + err.message + '</div></div>';
  }
}

function renderStats() {
  const total = allDeals.length;
  const offMarket = allDeals.filter(d => d.market !== 'on').length;
  const onMarket = total - offMarket;
  const totalValue = allDeals.reduce((sum, d) => sum + (d.wholesalePrice || 0), 0);
  const urgentDates = allDeals.filter(d => { const days = daysUntil(d.coeDate); return days !== null && days >= 0 && days <= 7; }).length;

  let html = '';
  html += '<div class="stat-pill"><span class="num">' + total + '</span> Total Deals</div>';
  html += '<div class="stat-pill"><span class="num">' + offMarket + '</span> Off-Market</div>';
  html += '<div class="stat-pill green"><span class="num">' + onMarket + '</span> On-Market</div>';
  html += '<div class="stat-pill"><span class="num">' + fmt$(totalValue) + '</span> Pipeline Value</div>';
  if (urgentDates > 0) html += '<div class="stat-pill red"><span class="num">' + urgentDates + '</span> Closing in 7 Days</div>';
  document.getElementById('statsBar').innerHTML = html;
}

// ── Editable field helpers ──

function field(key, label, val, type) {
  const cls = type === 'money' ? ' hi' : (type === 'green' ? ' green' : '');
  const display = type === 'money' ? fmt$(val) : (val || '—');
  return '<div class="detail-row">' +
    '<span class="detail-key">' + label + '</span>' +
    '<span class="detail-val' + cls + '" data-field="' + key + '">' + display + '</span>' +
    '</div>';
}

function dateRow(label, key, dateStr, days) {
  const cls = dateClass(days);
  const badge = days !== null ? ' <span style="font-size:0.5rem;opacity:0.7;">(' + dateLabel(days) + ')</span>' : '';
  return '<div class="detail-row">' +
    '<span class="detail-key">' + label + '</span>' +
    '<span class="detail-val ' + cls + '" data-field="' + key + '" data-type="date">' + (dateStr || '—') + badge + '</span>' +
    '</div>';
}

// ── Render deals ──

function renderDeals() {
  const grid = document.getElementById('dealGrid');
  let filtered = allDeals;
  if (currentFilter === 'off') filtered = allDeals.filter(d => d.market !== 'on');
  if (currentFilter === 'on') filtered = allDeals.filter(d => d.market === 'on');

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No deals match this filter.</div></div>';
    return;
  }

  grid.innerHTML = filtered.map((d, i) => {
    const totalRepairs = (d.repairsPerSqft && d.sqft) ? d.repairsPerSqft * d.sqft : null;
    const profit = (d.arv && totalRepairs != null && d.wholesalePrice) ? d.arv - totalRepairs - d.wholesalePrice : null;
    const coeDays = daysUntil(d.coeDate);
    const liveUrl = SITE_BASE + '/deals/' + d._slug + '/';
    const thumbHtml = d._thumb ? '<img src="' + d._thumb + '" alt="">' : '🏠';

    const coeBadge = (coeDays !== null && coeDays >= 0 && coeDays <= 7)
      ? ' <span style="font-size:0.5rem;color:var(--red);font-weight:700;">COE ' + dateLabel(coeDays) + '</span>' : '';

    // Photo gallery
    const photoHtml = d._photos.map(p =>
      '<div class="photo-item" data-photo-path="' + p.path + '" data-photo-sha="' + p.sha + '">' +
        '<img src="' + p.url + '" alt="' + p.name + '">' +
        '<button class="photo-delete" onclick="event.stopPropagation();deletePhoto(this)" title="Delete photo">&times;</button>' +
      '</div>'
    ).join('');

    return '<div class="deal-card" data-slug="' + d._slug + '" data-index="' + i + '">' +
      '<div class="card-top" onclick="toggleCard(this.parentElement)">' +
        '<div class="card-thumb">' + thumbHtml + '</div>' +
        '<div class="card-main">' +
          '<div class="card-address">' + (d.address || d._slug) + coeBadge + '</div>' +
          '<div class="card-location">' + ([d.city, d.state, d.zip].filter(Boolean).join(', ') || '—') + '</div>' +
        '</div>' +
        '<div class="card-numbers">' +
          '<div class="card-num"><div class="card-num-label">Ask</div><div class="card-num-val orange">' + fmt$(d.wholesalePrice) + '</div></div>' +
          '<div class="card-num"><div class="card-num-label">ARV</div><div class="card-num-val">' + fmt$(d.arv) + '</div></div>' +
          (totalRepairs != null ? '<div class="card-num"><div class="card-num-label">Repairs <span style="font-size:0.45rem;opacity:0.7;">(' + d.repairsPerSqft + '/sqft × ' + Number(d.sqft).toLocaleString() + ')</span></div><div class="card-num-val red">' + fmt$(totalRepairs) + '</div></div>' : '') +
          (profit !== null ? '<div class="card-num"><div class="card-num-label">Gross Profit</div><div class="card-num-val green">' + fmt$(profit) + '</div></div>' : '') +
          '<div class="card-badges">' +
            '<span class="card-badge ' + (d.market === 'on' ? 'badge-on' : 'badge-off') + '">' + (d.market === 'on' ? 'Active' : 'Off-Market') + '</span>' +
          '</div>' +
          '<span class="card-expand-icon">▾</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-detail"><div class="card-detail-inner">' +
        '<div class="detail-grid">' +
          // ADDRESS
          '<div class="detail-section">' +
            '<div class="detail-section-title">Address & Info</div>' +
            field('address', 'Address', d.address) +
            field('city', 'City', d.city) +
            field('state', 'State', d.state) +
            field('zip', 'Zip', d.zip) +
            '<div class="detail-row"><span class="detail-key">Market</span>' +
              '<span class="detail-val" data-field="market" data-type="select" data-options="off,on">' + (d.market === 'on' ? 'On-Market' : 'Off-Market') + '</span></div>' +
            field('realtorName', 'Realtor', d.realtorName) +
            field('realtorPhone', 'Realtor Phone', d.realtorPhone) +
          '</div>' +
          // DATES
          '<div class="detail-section">' +
            '<div class="detail-section-title">Key Dates</div>' +
            dateRow('COE Date', 'coeDate', d.coeDate, coeDays) +
            dateRow('DD End', 'ddEndDate', d.ddEndDate, daysUntil(d.ddEndDate)) +
            dateRow('EMD Due', 'emdDueDate', d.emdDueDate, daysUntil(d.emdDueDate)) +
            dateRow('Accepted', 'acceptedDate', d.acceptedDate, null) +
          '</div>' +
          // MONEY
          '<div class="detail-section">' +
            '<div class="detail-section-title">Financials</div>' +
            field('wholesalePrice', 'Wholesale Price', d.wholesalePrice, 'money') +
            field('arv', 'ARV', d.arv, 'money') +
            field('repairsPerSqft', 'Repairs $/sqft', d.repairsPerSqft) +
            (totalRepairs != null ? '<div class="detail-row"><span class="detail-key">Total Repairs (' + d.repairsPerSqft + ' × ' + Number(d.sqft).toLocaleString() + ')</span><span class="detail-val hi">' + fmt$(totalRepairs) + '</span></div>' : '') +
            (profit !== null ? '<div class="detail-row"><span class="detail-key">Gross Profit</span><span class="detail-val green">' + fmt$(profit) + '</span></div>' : '') +
          '</div>' +
          // PROPERTY
          '<div class="detail-section">' +
            '<div class="detail-section-title">Property Details</div>' +
            field('beds', 'Beds', d.beds) +
            field('baths', 'Baths', d.baths) +
            field('sqft', 'Sqft', d.sqft) +
            field('lotSize', 'Lot', d.lotSize) +
            field('yearBuilt', 'Year Built', d.yearBuilt) +
            field('garage', 'Garage', d.garage) +
          '</div>' +
          // NOTES
          '<div class="detail-section" style="grid-column:span 2;">' +
            '<div class="detail-section-title">Notes</div>' +
            '<div class="detail-val" data-field="notes" data-type="textarea" style="text-align:left;font-size:0.72rem;line-height:1.6;white-space:pre-wrap;">' + (d.notes || 'No notes yet.') + '</div>' +
          '</div>' +
        '</div>' +

        // PHOTOS
        '<div class="photo-section">' +
          '<div class="photo-section-title">Photos (' + d._photoCount + ')</div>' +
          '<div class="photo-grid" id="photos-' + d._slug + '">' + photoHtml + '</div>' +
          '<div class="photo-upload-zone" ondragover="event.preventDefault();this.classList.add(\'drag-over\')" ondragleave="this.classList.remove(\'drag-over\')" ondrop="event.preventDefault();this.classList.remove(\'drag-over\');handlePhotoDrop(event,\'' + d._slug + '\')">' +
            '<input type="file" accept="image/*" multiple onchange="handlePhotoSelect(event,\'' + d._slug + '\')">' +
            '<div class="photo-upload-label">Drop photos here or <span>click to upload</span></div>' +
          '</div>' +
        '</div>' +

        // ACTIONS
        '<div class="card-actions">' +
          '<a href="' + liveUrl + '" target="_blank" class="card-action-btn btn-view" onclick="event.stopPropagation()">View Deal Page &rarr;</a>' +
          '<button class="card-action-btn btn-edit" onclick="event.stopPropagation();enterEditMode(this)">Edit Deal</button>' +
          '<button class="card-action-btn btn-save" onclick="event.stopPropagation();saveDeal(this)" style="display:none;">Save Changes</button>' +
          '<button class="card-action-btn btn-cancel" onclick="event.stopPropagation();cancelEdit(this)" style="display:none;">Cancel</button>' +
          '<button class="card-action-btn btn-close" onclick="event.stopPropagation();pushToClose(this)">Push to Close</button>' +
          '<button class="card-action-btn btn-workflow" onclick="event.stopPropagation();createWorkflow(this)">Create Workflow</button>' +
          '<div class="save-status" id="status-' + d._slug + '"></div>' +
        '</div>' +
      '</div></div>' +
    '</div>';
  }).join('');
}

// ── Toggle card ──

function toggleCard(card) {
  card.classList.toggle('open');
}

// ── Edit mode ──

function enterEditMode(btn) {
  const card = btn.closest('.deal-card');
  const slug = card.dataset.slug;
  const deal = allDeals.find(d => d._slug === slug);
  if (!deal) return;

  card.classList.add('editing');
  if (!card.classList.contains('open')) card.classList.add('open');

  // Show save/cancel, hide edit
  btn.style.display = 'none';
  card.querySelector('.btn-save').style.display = '';
  card.querySelector('.btn-cancel').style.display = '';

  // Convert all data-field spans to inputs
  card.querySelectorAll('[data-field]').forEach(span => {
    const key = span.dataset.field;
    const type = span.dataset.type || 'text';
    const rawVal = deal[key] != null ? deal[key] : '';

    if (type === 'textarea') {
      const ta = document.createElement('textarea');
      ta.className = 'edit-textarea';
      ta.dataset.field = key;
      ta.value = rawVal;
      span.replaceWith(ta);
    } else if (type === 'select') {
      const options = (span.dataset.options || '').split(',');
      const sel = document.createElement('select');
      sel.className = 'edit-select';
      sel.dataset.field = key;
      options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt;
        o.textContent = opt === 'on' ? 'On-Market' : 'Off-Market';
        if (String(rawVal) === opt) o.selected = true;
        sel.appendChild(o);
      });
      span.replaceWith(sel);
    } else if (type === 'date') {
      const inp = document.createElement('input');
      inp.type = 'date';
      inp.className = 'edit-input';
      inp.dataset.field = key;
      inp.value = rawVal;
      span.replaceWith(inp);
    } else {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'edit-input' + (key === 'address' || key === 'realtorName' ? ' wide' : '');
      inp.dataset.field = key;
      inp.value = rawVal;
      span.replaceWith(inp);
    }
  });
}

function cancelEdit(btn) {
  // Simplest: re-render everything
  renderDeals();
}

// ── Save deal ──

async function saveDeal(btn) {
  const card = btn.closest('.deal-card');
  const slug = card.dataset.slug;
  const deal = allDeals.find(d => d._slug === slug);
  if (!deal) return;

  const status = document.getElementById('status-' + slug);
  status.className = 'save-status saving';
  status.textContent = 'Saving...';
  btn.disabled = true;

  // Collect edited values
  card.querySelectorAll('[data-field]').forEach(el => {
    const key = el.dataset.field;
    let val = el.value;
    // Convert numeric fields (strip $ and commas, preserve decimals)
    if (['wholesalePrice','arv','repairsPerSqft','beds','baths','sqft','yearBuilt','ddDays','emdDays'].includes(key)) {
      const num = parseFloat(String(val).replace(/[$,]/g, ''));
      val = isNaN(num) ? '' : num;
    }
    deal[key] = val;
  });

  // Build clean JSON (strip internal fields)
  const cleanDeal = {};
  Object.keys(deal).forEach(k => {
    if (!k.startsWith('_')) cleanDeal[k] = deal[k];
  });

  try {
    // Get current SHA
    const current = await ghGet('/repos/' + GITHUB_REPO + '/contents/deals/' + slug + '/deal-doc.txt');
    const sha = current.sha || deal._docSha;

    // PUT updated file
    const result = await ghPut('/repos/' + GITHUB_REPO + '/contents/deals/' + slug + '/deal-doc.txt', {
      message: 'Update deal: ' + (deal.address || slug),
      content: btoa(unescape(encodeURIComponent(JSON.stringify(cleanDeal, null, 2)))),
      sha: sha
    });

    if (result.content) {
      deal._docSha = result.content.sha;
      status.className = 'save-status saved';
      status.textContent = 'Saved!';
      setTimeout(() => {
        renderDeals();
        renderStats();
      }, 1200);
    } else {
      throw new Error(result.message || 'GitHub write failed');
    }
  } catch(err) {
    status.className = 'save-status error';
    status.textContent = 'Error: ' + err.message;
    btn.disabled = false;
  }
}

// ── Photo management ──

async function deletePhoto(btn) {
  if (!confirm('Delete this photo? This removes it from GitHub.')) return;

  const item = btn.closest('.photo-item');
  const path = item.dataset.photoPath;
  const sha = item.dataset.photoSha;

  btn.textContent = '...';
  btn.disabled = true;

  try {
    const result = await ghDelete('/repos/' + GITHUB_REPO + '/contents/' + path, {
      message: 'Delete photo: ' + path.split('/').pop(),
      sha: sha
    });
    item.style.opacity = '0';
    item.style.transform = 'scale(0.8)';
    item.style.transition = 'all 0.3s';
    setTimeout(() => item.remove(), 300);

    // Update deal photo count
    const slug = path.split('/')[1];
    const deal = allDeals.find(d => d._slug === slug);
    if (deal) {
      deal._photos = deal._photos.filter(p => p.path !== path);
      deal._photoCount = deal._photos.length;
      deal._thumb = deal._photos.length ? deal._photos[0].url : null;
    }
  } catch(err) {
    alert('Delete failed: ' + err.message);
    btn.textContent = '×';
    btn.disabled = false;
  }
}

async function handlePhotoSelect(event, slug) {
  const files = event.target.files;
  if (!files.length) return;
  await uploadPhotos(slug, files);
  event.target.value = '';
}

async function handlePhotoDrop(event, slug) {
  const files = event.dataTransfer.files;
  if (!files.length) return;
  await uploadPhotos(slug, files);
}

async function uploadPhotos(slug, files) {
  const grid = document.getElementById('photos-' + slug);
  const deal = allDeals.find(d => d._slug === slug);

  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;

    // Show uploading placeholder
    const placeholder = document.createElement('div');
    placeholder.className = 'photo-item';
    placeholder.style.display = 'flex';
    placeholder.style.alignItems = 'center';
    placeholder.style.justifyContent = 'center';
    placeholder.style.fontSize = '0.6rem';
    placeholder.style.color = 'var(--orange)';
    placeholder.textContent = 'Uploading...';
    grid.appendChild(placeholder);

    try {
      // Read file as base64
      const base64 = await fileToBase64(file);
      const fileName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = 'deals/' + slug + '/' + fileName;

      // Check if file already exists (get SHA)
      let sha;
      try {
        const existing = await ghGet('/repos/' + GITHUB_REPO + '/contents/' + path);
        sha = existing.sha;
      } catch(e) {}

      const body = {
        message: 'Add photo: ' + fileName,
        content: base64
      };
      if (sha) body.sha = sha;

      const result = await ghPut('/repos/' + GITHUB_REPO + '/contents/' + path, body);

      if (result.content) {
        const photoUrl = SITE_BASE + '/' + path;
        placeholder.innerHTML = '<img src="' + photoUrl + '" alt="' + fileName + '">' +
          '<button class="photo-delete" style="display:flex;" onclick="event.stopPropagation();deletePhoto(this)" title="Delete photo">&times;</button>';
        placeholder.dataset.photoPath = path;
        placeholder.dataset.photoSha = result.content.sha;

        if (deal) {
          deal._photos.push({ name: fileName, sha: result.content.sha, url: photoUrl, path });
          deal._photoCount = deal._photos.length;
          if (!deal._thumb) deal._thumb = photoUrl;
        }
      } else {
        throw new Error('Upload failed');
      }
    } catch(err) {
      placeholder.textContent = 'Failed';
      placeholder.style.color = 'var(--red)';
      setTimeout(() => placeholder.remove(), 2000);
    }
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      // Strip data:image/xxx;base64, prefix
      resolve(reader.result.split(',')[1]);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── Push to Close CRM ──

async function pushToClose(btn) {
  const card = btn.closest('.deal-card');
  const slug = card.dataset.slug;
  const deal = allDeals.find(d => d._slug === slug);
  if (!deal) return;

  const status = document.getElementById('status-' + slug);
  btn.disabled = true;
  btn.textContent = 'Pushing...';
  status.className = 'save-status saving';
  status.textContent = 'Searching Close for lead...';

  const address = deal.address || slug;
  const dealUrl = 'https://goodresults.org/deals/' + slug + '/';
  const askingN = parseDollar(deal.wholesalePrice);
  const arvN = parseDollar(deal.arv);

  try {
    // Find lead
    const searchData = await closeAPI(
      '/lead/?query=' + encodeURIComponent(address) + '&_fields=id,display_name,opportunities&_limit=5',
      'GET'
    );
    const leads = searchData.data || [];
    let targetOpp = null;
    let matchedLead = null;
    for (const lead of leads) {
      const opps = lead.opportunities || [];
      const pipelineOpp = opps.find(o => o.pipeline_id === CLOSE_PIPELINE);
      if (pipelineOpp) { targetOpp = pipelineOpp; matchedLead = lead; break; }
      if (!targetOpp && opps.length > 0) { targetOpp = opps[0]; matchedLead = lead; }
    }

    if (!targetOpp) {
      status.className = 'save-status error';
      status.textContent = 'No matching lead found in Close for "' + address + '"';
      btn.textContent = 'Push to Close';
      btn.disabled = false;
      return;
    }

    status.textContent = 'Updating opp on "' + matchedLead.display_name + '"...';

    // Get existing opp
    const existingOpp = await closeAPI('/opportunity/' + targetOpp.id + '/', 'GET');
    const existing = existingOpp.custom || {};

    const updatePayload = {};
    function setCF(key, val) {
      if (!val) return;
      const fieldId = CF[key];
      const current = existing[fieldId];
      if (!current || current === '' || current === null) {
        updatePayload['custom.' + fieldId] = val;
      }
    }

    const fullAddr = [address, deal.city, deal.state, deal.zip].filter(Boolean).join(', ');
    setCF('address', fullAddr);

    const contractPriceN = parseDollar(deal.contractPrice);
    if (contractPriceN) setCF('currentContractPrice', '$' + contractPriceN.toLocaleString());
    if (askingN) setCF('wholesalePrice', '$' + askingN.toLocaleString());
    if (askingN && !existingOpp.value) {
      updatePayload.value = Math.round(askingN * 100);
    }
    if (arvN) setCF('arv', '$' + arvN.toLocaleString());
    if (deal.coeDate) setCF('coeDate', deal.coeDate);
    if (deal.acceptedDate || deal.executedDate) setCF('acceptedDate', deal.acceptedDate || deal.executedDate);
    if (deal.emdAmount) setCF('emdAmount', deal.emdAmount);
    if (deal.ddEndDate) setCF('ddEndDate', deal.ddEndDate);
    if (deal.emdDueDate) setCF('emdDueDate', deal.emdDueDate);

    // Note with property details + deal URL
    const noteLines = [address];
    const propDetails = [
      deal.beds ? deal.beds + ' bd' : null,
      deal.baths ? deal.baths + ' ba' : null,
      deal.sqft ? Number(deal.sqft).toLocaleString() + ' sqft' : null
    ].filter(Boolean).join(' / ');
    if (propDetails) noteLines.push(propDetails);
    if (deal.yearBuilt) noteLines.push('Year: ' + deal.yearBuilt);
    if (deal.lotSize) noteLines.push('Lot: ' + deal.lotSize);
    noteLines.push('Deal page: ' + dealUrl);
    updatePayload.note = noteLines.join('\n');

    const fieldCount = Object.keys(updatePayload).length;
    await closeAPI('/opportunity/' + targetOpp.id + '/', 'PUT', updatePayload);

    status.className = 'save-status saved';
    status.textContent = 'Close updated ✓ on "' + matchedLead.display_name + '" (' + (fieldCount - 1) + ' fields)';
    btn.textContent = '✓ Close Updated';
    btn.classList.add('done');

  } catch(err) {
    console.error('Close push failed:', err);
    status.className = 'save-status error';
    status.textContent = 'Close push failed: ' + err.message;
    btn.textContent = 'Retry Close';
    btn.disabled = false;
  }
}

// ── Create Dispo Workflow ──

async function createWorkflow(btn) {
  const card = btn.closest('.deal-card');
  const slug = card.dataset.slug;
  const deal = allDeals.find(d => d._slug === slug);
  if (!deal) return;

  const status = document.getElementById('status-' + slug);
  btn.disabled = true;
  btn.textContent = 'Creating...';
  status.className = 'save-status saving';
  status.textContent = 'Creating templates + workflow...';

  const address = deal.address || slug;
  const dealUrl = 'https://goodresults.org/deals/' + slug + '/';

  try {
    // Create deal-link SMS template
    const linkSmsTmpl = await closeAPI('/sms_template/', 'POST', {
      name: address + ' - Deal Link',
      text: 'Here are the details on that deal I mentioned... check it out and let me know if you have any questions\n' + dealUrl,
      is_shared: true
    });

    // Create deal email template
    const emailTmpl = await closeAPI('/email_template/', 'POST', {
      name: address + ' - Deal Email',
      subject: 'Deal details — ' + address,
      body: '<p>Hey {{ contact.first_name }},</p><p>Here are the details on that deal I mentioned...</p><p><a href="' + dealUrl + '">' + dealUrl + '</a></p><p>Let me know if you have any questions or want to take a look at it.</p><p>{{ user.first_name }}<br>Good Results Home Buyers</p>',
      is_shared: true
    });

    // Create 6-step workflow
    const workflow = await closeAPI('/sequence/', 'POST', {
      name: address + ' - Dispo',
      timezone: 'America/Los_Angeles',
      steps: [
        { step_type: 'sms',   delay: 0,     sms_template_id: TEASER_TMPL },
        { step_type: 'email', delay: 0,     email_template_id: emailTmpl.id, threading: 'new_thread' },
        { step_type: 'sms',   delay: 2760,  sms_template_id: linkSmsTmpl.id },
        { step_type: 'sms',   delay: 86400, sms_template_id: FOLLOWUP_TMPL },
        { step_type: 'email', delay: 0,     email_template_id: emailTmpl.id, threading: 'new_thread' },
        { step_type: 'sms',   delay: 7200,  sms_template_id: NUDGE_TMPL }
      ]
    });

    status.className = 'save-status saved';
    status.textContent = 'Workflow "' + workflow.name + '" created ✓';
    btn.textContent = '✓ Workflow Created';
    btn.classList.add('done');

  } catch(err) {
    console.error('Workflow creation failed:', err);
    status.className = 'save-status error';
    status.textContent = 'Workflow failed: ' + err.message;
    btn.textContent = 'Retry Workflow';
    btn.disabled = false;
  }
}

// ── Filters ──

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  renderDeals();
});
